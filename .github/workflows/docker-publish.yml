name: Publish Backend Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - src/**
      - Caddy/**
      - src/go.mod
      - src/go.sum
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            firechickenmp4/backend-app:latest
            firechickenmp4/backend-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect infra config changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'docker-compose.yml'
              - 'Caddy/**'

      - name: Upload compose and Caddy config
        if: steps.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,Caddy/Caddyfile"
          target: ${{ secrets.SERVER_PATH }}
          overwrite: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            cd ${{ secrets.SERVER_PATH }}

            retry() {
              max_attempts="$1"
              delay_seconds="$2"
              shift 2

              attempt=1
              while true; do
                if "$@"; then
                  return 0
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "Command failed after ${attempt} attempts: $*"
                  return 1
                fi

                echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${delay_seconds}s: $*"
                attempt=$((attempt + 1))
                sleep "$delay_seconds"
              done
            }

            probe_caddy() {
              curl -fsS --max-time 5 -H "Host: localhost" http://127.0.0.1/health
            }

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in SERVER_PATH"
              exit 1
            fi

            mkdir -p Caddy
            if [ ! -f Caddy/Caddyfile ]; then
              echo "Caddy/Caddyfile not found in SERVER_PATH"
              exit 1
            fi

            docker compose config --quiet

            NEW_TAG="${{ github.sha }}"
            PREV_TAG="$(docker compose ps -q app | xargs -r docker inspect --format '{{.Config.Image}}' 2>/dev/null | sed -n 's|.*:||p' | head -n1)"
            if [ -z "$PREV_TAG" ] && [ -f .last_app_tag ]; then
              PREV_TAG="$(cat .last_app_tag)"
            fi
            if [ -z "$PREV_TAG" ]; then
              PREV_TAG="latest"
            fi

            echo "Previous tag: $PREV_TAG"
            echo "Deploying tag: $NEW_TAG"

            export IMAGE_TAG="$NEW_TAG"
            retry 5 8 docker compose pull app
            docker compose up -d --no-deps app

            HEALTHY="false"
            for i in $(seq 1 30); do
              APP_CID="$(docker compose ps -q app)"
              if [ -z "$APP_CID" ]; then
                sleep 2
                continue
              fi

              STATUS="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$APP_CID" 2>/dev/null || true)"
              echo "Health check [$i/30]: $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                HEALTHY="true"
                break
              fi

              if [ "$STATUS" = "unhealthy" ] || [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                break
              fi

              sleep 3
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "Deploy failed, rolling back to tag: $PREV_TAG"
              export IMAGE_TAG="$PREV_TAG"
              retry 3 8 docker compose pull app || true
              docker compose up -d --no-deps app
              exit 1
            fi

            HEALTH_BODY="$(curl -fsS --max-time 5 http://127.0.0.1:8080/health || true)"
            echo "HTTP /health response: ${HEALTH_BODY}"
            if [ -z "$HEALTH_BODY" ] || ! echo "$HEALTH_BODY" | grep -q '"code":200' || ! echo "$HEALTH_BODY" | grep -q "I'm OK."; then
              echo "HTTP /health validation failed, rolling back to tag: $PREV_TAG"
              export IMAGE_TAG="$PREV_TAG"
              retry 3 8 docker compose pull app || true
              docker compose up -d --no-deps app
              exit 1
            fi

            CADDY_HEALTH_BODY="$(probe_caddy || true)"
            echo "Caddy /health response: ${CADDY_HEALTH_BODY}"
            if [ "$CADDY_HEALTH_BODY" != "OK" ]; then
              echo "Caddy probe failed, trying to self-heal by restarting caddy..."
              docker compose up -d --no-deps caddy
              sleep 3

              CADDY_HEALTH_BODY="$(probe_caddy || true)"
              echo "Caddy /health response after restart: ${CADDY_HEALTH_BODY}"
              if [ "$CADDY_HEALTH_BODY" != "OK" ]; then
                echo "Caddy reverse-proxy validation failed after self-heal."
                echo "Skip app rollback because this is likely a proxy/config/network issue."
                exit 1
              fi
            fi

            echo "$NEW_TAG" > .last_app_tag
            docker image prune -f
