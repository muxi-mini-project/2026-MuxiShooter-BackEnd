name: Publish Backend Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - src/**
      # - config/**
      # - Caddy/**
      - src/go.mod
      - src/go.sum
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            firechickenmp4/backend-app:latest
            firechickenmp4/backend-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            cd ${{ secrets.SERVER_PATH }}

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in SERVER_PATH"
              exit 1
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            NEW_TAG="${{ github.sha }}"
            PREV_TAG="$(docker compose ps -q app | xargs -r docker inspect --format '{{.Config.Image}}' 2>/dev/null | sed -n 's|.*:||p' | head -n1)"
            if [ -z "$PREV_TAG" ] && [ -f .last_app_tag ]; then
              PREV_TAG="$(cat .last_app_tag)"
            fi
            if [ -z "$PREV_TAG" ]; then
              PREV_TAG="latest"
            fi

            echo "Previous tag: $PREV_TAG"
            echo "Deploying tag: $NEW_TAG"

            export IMAGE_TAG="$NEW_TAG"
            docker compose pull app
            docker compose up -d app

            HEALTHY="false"
            for i in $(seq 1 30); do
              APP_CID="$(docker compose ps -q app)"
              if [ -z "$APP_CID" ]; then
                sleep 2
                continue
              fi

              STATUS="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$APP_CID" 2>/dev/null || true)"
              echo "Health check [$i/30]: $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                HEALTHY="true"
                break
              fi

              if [ "$STATUS" = "unhealthy" ] || [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                break
              fi

              sleep 3
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "Deploy failed, rolling back to tag: $PREV_TAG"
              export IMAGE_TAG="$PREV_TAG"
              docker compose pull app || true
              docker compose up -d app
              exit 1
            fi

            echo "$NEW_TAG" > .last_app_tag
            docker image prune -f
