basePath: /api
definitions:
  dto.AdminDeleteResourceByTypeRequest:
    description: 用于skills/achievements/items/cards的删除（按ID）
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  dto.AdminDeleteUserRequest:
    description: 按用户ID删除用户
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  dto.AdminUpdateUserGroupRequest:
    description: 按用户ID修改权限组，仅支持user/admin
    properties:
      new_group:
        enum:
        - user
        - admin
        type: string
      user_id:
        type: integer
    required:
    - new_group
    - user_id
    type: object
  dto.AuthData:
    properties:
      expires_at:
        description: 有效期，24h
        type: integer
      token:
        description: JWT Token
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.CommonUserData'
        description: 用户
    type: object
  dto.CommonAdminResourceData:
    properties:
      created_at:
        type: string
      description:
        type: string
      prq_skill_id:
        type: integer
      resource_id:
        type: integer
      resource_name:
        type: string
      skill_group:
        type: string
      updated_at:
        type: string
    type: object
  dto.CommonAdminResourcePageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.CommonAdminResourceData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.CommonRelationResourceData:
    properties:
      description:
        type: string
      prq_skill_id:
        type: integer
      resource_id:
        type: integer
      resource_name:
        type: string
      skill_group:
        type: string
    type: object
  dto.CommonResourceCreateRequest:
    description: 用于achievements/items/cards，skills可额外携带技能字段
    properties:
      description:
        type: string
      name:
        type: string
      prq_skill_id:
        type: integer
      skill_group:
        type: string
    type: object
  dto.CommonResourceUpdateRequest:
    description: 用于achievements/items/cards，skills可额外携带技能字段
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      prq_skill_id:
        type: integer
      skill_group:
        type: string
    type: object
  dto.CommonUserData:
    properties:
      group:
        description: 权限组
        type: string
      head_image_path:
        description: 头像路径
        type: string
      select_coin:
        description: 抽卡货币
        type: integer
      strength_coin:
        description: 强化货币
        type: integer
      user_id:
        description: 用户ID
        type: integer
      username:
        description: 用户名
        type: string
    type: object
  dto.CommonUserRelationData:
    properties:
      claimed:
        type: boolean
      claimed_at:
        type: string
      complete_at:
        type: string
      created_at:
        type: string
      is_complete:
        type: boolean
      resource:
        $ref: '#/definitions/dto.CommonRelationResourceData'
      skill_grade:
        type: integer
      updated_at:
        type: string
    type: object
  dto.CommonUserRelationPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.CommonUserRelationData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.LoginRequest:
    description: 登录信息
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.PaginatedData:
    properties:
      list:
        description: 查询所得列表
      page:
        description: 页码
        type: integer
      page_size:
        description: 每页多少
        type: integer
      total:
        description: 返回数据总数
        type: integer
    type: object
  dto.RegisterRequest:
    description: 注册信息
    properties:
      password:
        maxLength: 25
        minLength: 6
        type: string
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.Response:
    description: 通用响应结构体
    properties:
      code:
        description: http状态码
        type: integer
      data:
        description: 根据具体数据来定类型
      message:
        description: 返回的消息
        type: string
    type: object
  dto.UpdateCoinByTypeRequest:
    description: 通过query参数type(strength/select)修改对应金币值
    properties:
      coin:
        type: integer
    required:
    - coin
    type: object
  dto.UpdatePasswordRequest:
    description: 修改密码
    properties:
      new_password:
        maxLength: 25
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.UpdateUsernameRequest:
    description: 修改用户名
    properties:
      new_username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - new_username
    type: object
  dto.UserRelationCreateRequest:
    description: 按资源ID创建本人关联记录
    properties:
      resource_id:
        type: integer
    required:
    - resource_id
    type: object
  dto.UserRelationDeleteRequest:
    description: 按资源ID删除本人关联记录
    properties:
      resource_id:
        type: integer
    required:
    - resource_id
    type: object
  dto.UserRelationUpdateRequest:
    description: 按资源ID更新本人关联记录，skills可额外更新skill_grade
    properties:
      claimed:
        type: boolean
      is_complete:
        type: boolean
      resource_id:
        type: integer
      skill_grade:
        type: integer
    required:
    - resource_id
    type: object
host: localhost:8080
info:
  contact:
    email: 13930176445@163.com
    name: FireChickenMP4
  description: MuXiShooter
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms
  title: MuXiShooter
  version: "1.0"
paths:
  /api/admin/get/getusers:
    get:
      description: |-
        注: 管理员可用，查询结果是多重模糊搜索叠加的效果
        以及页码不输入或不合规范自动为第一页，每页多少不输入默认20，最多100
        如果查询结果不存在则返回切片为空
        用了id查询的话就一定只是一个确定的，而不是模糊搜索，其他参数就没用了（分页也是）
      parameters:
      - description: 用户id
        in: query
        name: user_id
        type: integer
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 权限组(user/admin)
        in: query
        name: group
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedData'
              type: object
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 获取用户列表
      tags:
      - admin-user
  /api/admin/get/resources:
    get:
      description: 通过query参数type查询skills/achievements/items/cards；支持分页与可选id精确查询
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 资源ID，传入后优先精确查询
        in: query
        name: id
        type: integer
      - description: 名称模糊搜索
        in: query
        name: name
        type: string
      - description: 技能组模糊搜索(type=skills有效)
        in: query
        name: skill_group
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommonAdminResourcePageData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型查询基础资源
      tags:
      - admin-resource
  /api/admin/get/user-relations:
    get:
      description: |-
        通过query参数user_id和type查询指定用户在achievements/skills/items/cards中的关联数据
        skills会返回skill_grade，其他类型没有这个字段
        data.list: []dto.CommonUserRelationData
      parameters:
      - description: 用户ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: 关联类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommonUserRelationPageData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型查询任意用户关联数据
      tags:
      - admin-resource
  /api/admin/operation/deleteuser:
    delete:
      consumes:
      - application/json
      description: 管理员删除用户。ID=1(初始化管理员)不可删除；其他管理员仅可删除普通用户
      parameters:
      - description: 删除用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminDeleteUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员删除用户
      tags:
      - admin-user
  /api/admin/operation/resources:
    delete:
      consumes:
      - application/json
      description: 通过query参数type删除skills/achievements/items/cards中的一种资源
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 删除请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminDeleteResourceByTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 目标资源不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型删除基础资源
      tags:
      - admin-resource
    post:
      consumes:
      - application/json
      description: |-
        通过query参数type创建skills/achievements/items/cards中的一种资源
        skills需要额外参数skill_group和prq_skill_id，其他资源只需要公共请求体
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 创建请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CommonResourceCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommonAdminResourceData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 名称冲突
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型创建基础资源
      tags:
      - admin-resource
  /api/admin/update/resources:
    put:
      consumes:
      - application/json
      description: |-
        通过query参数type更新skills/achievements/items/cards中的一种资源
        skills需要额外参数skill_group和prq_skill_id，其他资源只需要公共请求体
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 更新请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CommonResourceUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommonAdminResourceData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 目标资源不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 名称冲突
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型更新基础资源
      tags:
      - admin-resource
  /api/admin/update/usergroup:
    put:
      consumes:
      - application/json
      description: ID=1(初始化管理员)权限组不可修改；仅ID=1可修改其他用户权限组
      parameters:
      - description: 修改权限组请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminUpdateUserGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员修改用户权限组
      tags:
      - admin-user
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 认证失败
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 用户登录
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: 注册用户
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 用户已存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 用户注册
      tags:
      - auth
  /profile/get/relations:
    get:
      description: 通过query参数type查询本人在achievements/skills/items/cards中的关联数据，支持分页
      parameters:
      - description: 关联类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: 用户按类型查询自身资源关联
      tags:
      - profile-relation
  /profile/get/self:
    get:
      description: 查询当前登录用户的基础信息
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - profile
  /profile/operation/logout:
    get:
      description: 当前登录用户登出（使现有token失效）
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常或用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - profile
  /profile/operation/relations:
    delete:
      consumes:
      - application/json
      description: 通过query参数type(achievements/skills/items/cards)和body中的resource_id删除本人关联记录
      parameters:
      - description: 关联类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 删除关联请求体
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserRelationDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
