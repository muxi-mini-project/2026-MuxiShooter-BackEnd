basePath: /api
definitions:
  dto.AchievementBrief:
    properties:
      achievement_id:
        type: integer
      achievement_name:
        type: string
      description:
        type: string
    type: object
  dto.AdminCreateSkillRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        minLength: 1
        type: string
      prq_skill_id:
        type: integer
      skill_group:
        type: string
    required:
    - name
    type: object
  dto.AdminDeleteResourceByTypeRequest:
    description: 用于skills/achievements/items/cards的删除（按ID）
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  dto.AdminDeleteUserRequest:
    description: 按用户ID删除用户
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  dto.AdminUpdateSkillRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      prq_skill_id:
        type: integer
      skill_group:
        type: string
    required:
    - id
    type: object
  dto.AdminUpdateUserGroupRequest:
    description: 按用户ID修改权限组，仅支持user/admin
    properties:
      new_group:
        enum:
        - user
        - admin
        type: string
      user_id:
        type: integer
    required:
    - new_group
    - user_id
    type: object
  dto.AuthData:
    properties:
      expires_at:
        description: 有效期，24h
        type: integer
      token:
        description: JWT Token
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.CommonUserData'
        description: 用户
    type: object
  dto.CardBrief:
    properties:
      card_id:
        type: integer
      card_name:
        type: string
      description:
        type: string
    type: object
  dto.CommonUserData:
    properties:
      group:
        description: 权限组
        type: string
      head_image_path:
        description: 头像路径
        type: string
      select_coin:
        description: 抽卡货币
        type: integer
      strength_coin:
        description: 强化货币
        type: integer
      user_id:
        description: 用户ID
        type: integer
      username:
        description: 用户名
        type: string
    type: object
  dto.ItemBrief:
    properties:
      description:
        type: string
      item_id:
        type: integer
      item_name:
        type: string
    type: object
  dto.LoginRequest:
    description: 登录信息
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.PaginatedData:
    properties:
      list:
        description: 查询所得列表
      page:
        description: 页码
        type: integer
      page_size:
        description: 每页多少
        type: integer
      total:
        description: 返回数据总数
        type: integer
    type: object
  dto.RegisterRequest:
    description: 注册信息
    properties:
      password:
        maxLength: 25
        minLength: 6
        type: string
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.Response:
    description: 通用响应结构体
    properties:
      code:
        description: http状态码
        type: integer
      data:
        description: 根据具体数据来定类型
      message:
        description: 返回的消息
        type: string
    type: object
  dto.SkillBrief:
    properties:
      description:
        type: string
      prq_skill_id:
        type: integer
      skill_group:
        type: string
      skill_id:
        type: integer
      skill_name:
        type: string
    type: object
  dto.UpdatePasswordRequest:
    description: 修改密码
    properties:
      new_password:
        maxLength: 25
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.UpdateUsernameRequest:
    description: 修改用户名
    properties:
      new_username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - new_username
    type: object
  dto.UserAchievementRelationData:
    properties:
      achievement:
        $ref: '#/definitions/dto.AchievementBrief'
      claimed:
        type: boolean
      claimed_at:
        type: string
      complete_at:
        type: string
      created_at:
        type: string
      is_complete:
        type: boolean
      updated_at:
        type: string
    type: object
  dto.UserAchievementRelationPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.UserAchievementRelationData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.UserCardRelationData:
    properties:
      card:
        $ref: '#/definitions/dto.CardBrief'
      claimed:
        type: boolean
      claimed_at:
        type: string
      complete_at:
        type: string
      created_at:
        type: string
      is_complete:
        type: boolean
      updated_at:
        type: string
    type: object
  dto.UserCardRelationPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.UserCardRelationData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.UserItemRelationData:
    properties:
      claimed:
        type: boolean
      claimed_at:
        type: string
      complete_at:
        type: string
      created_at:
        type: string
      is_complete:
        type: boolean
      item:
        $ref: '#/definitions/dto.ItemBrief'
      updated_at:
        type: string
    type: object
  dto.UserItemRelationPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.UserItemRelationData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.UserSkillRelationData:
    properties:
      claimed:
        type: boolean
      claimed_at:
        type: string
      complete_at:
        type: string
      created_at:
        type: string
      is_complete:
        type: boolean
      skill:
        $ref: '#/definitions/dto.SkillBrief'
      skill_grade:
        type: integer
      updated_at:
        type: string
    type: object
  dto.UserSkillRelationPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/dto.UserSkillRelationData'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: 13930176445@163.com
    name: FireChickenMP4
  description: MuXiShooter
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms
  title: MuXiShooter
  version: "1.0"
paths:
  /api/admin/get/getusers:
    get:
      description: |-
        注: 管理员可用，查询结果是多重模糊搜索叠加的效果
        以及页码不输入或不合规范自动为第一页，每页多少不输入默认20，最多100
        如果查询结果不存在则返回切片为空
        用了id查询的话就一定只是一个确定的，而不是模糊搜索，其他参数就没用了（分页也是）
      parameters:
      - description: 用户id
        in: query
        name: user_id
        type: integer
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 权限组(user/admin)
        in: query
        name: group
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedData'
              type: object
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 获取用户列表
      tags:
      - admin-get
  /api/admin/get/resources:
    get:
      description: |-
        通过query参数type查询skills/achievements/items/cards；支持分页与可选id精确查询
        type可选值：achievements、skills、items、cards
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 资源ID，传入后优先精确查询
        in: query
        name: id
        type: integer
      - description: 名称模糊搜索
        in: query
        name: name
        type: string
      - description: 技能组模糊搜索(type=skills有效)
        in: query
        name: skill_group
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型查询基础资源
      tags:
      - admin-get
  /api/admin/operation/deleteuser:
    delete:
      consumes:
      - application/json
      description: 管理员删除用户。ID=1(初始化管理员)不可删除；其他管理员仅可删除普通用户
      parameters:
      - description: 删除用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminDeleteUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员删除用户
      tags:
      - admin-operation
  /api/admin/operation/resources:
    delete:
      consumes:
      - application/json
      description: 通过query参数type删除skills/achievements/items/cards中的一种资源
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 删除请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminDeleteResourceByTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 目标资源不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型删除基础资源
      tags:
      - admin-operation
    post:
      consumes:
      - application/json
      description: |-
        通过query参数type创建skills/achievements/items/cards中的一种资源
        type=achievements 请求体：dto.AdminCreateAchievementRequest
        type=skills 请求体：dto.AdminCreateSkillRequest
        type=items 请求体：dto.AdminCreateItemRequest
        type=cards 请求体：dto.AdminCreateCardRequest
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 创建请求体(示例以skills为准)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminCreateSkillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 名称冲突
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型创建基础资源
      tags:
      - admin-operation
  /api/admin/update/resources:
    put:
      consumes:
      - application/json
      description: |-
        通过query参数type更新skills/achievements/items/cards中的一种资源
        type=achievements 请求体：dto.AdminUpdateAchievementRequest
        type=skills 请求体：dto.AdminUpdateSkillRequest
        type=items 请求体：dto.AdminUpdateItemRequest
        type=cards 请求体：dto.AdminUpdateCardRequest
      parameters:
      - description: 资源类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 更新请求体(示例以skills为准)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminUpdateSkillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 目标资源不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 名称冲突
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员按类型更新基础资源
      tags:
      - admin-update
  /api/admin/update/usergroup:
    put:
      consumes:
      - application/json
      description: ID=1(初始化管理员)权限组不可修改；仅ID=1可修改其他用户权限组
      parameters:
      - description: 修改权限组请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminUpdateUserGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 管理员修改用户权限组
      tags:
      - admin-update
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 认证失败
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 用户登录
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: 注册用户
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: 用户已存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 用户注册
      tags:
      - auth
  /api/profile/get/relations:
    get:
      description: |-
        通过query参数type选择查询achievements/skills/items/cards中的一种
        type=achievements 时，data.list 为 []dto.UserAchievementRelationData
        type=skills 时，data.list 为 []dto.UserSkillRelationData
        type=items 时，data.list 为 []dto.UserItemRelationData
        type=cards 时，data.list 为 []dto.UserCardRelationData
      parameters:
      - description: 关联类型(achievements/skills/items/cards)
        in: query
        name: type
        required: true
        type: string
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页多少，默认20，最大100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: type=cards 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserCardRelationPageData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 按类型获取用户关联数据
      tags:
      - profile-get
  /api/profile/get/self:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommonUserData'
              type: object
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 数据库查询失败
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 获取用户自身基础信息
      tags:
      - profile-get
  /api/profile/operation/logout:
    get:
      description: 用户登出（token版号增加一）
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 用户登出（token版号增加一）
      tags:
      - profile-operation
  /api/profile/update/headimage:
    put:
      consumes:
      - multipart/form-data
      description: 修改用户头像
      parameters:
      - description: 新头像
        in: formData
        name: new_head_image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: 头像为空
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: 登录状态异常
          schema:
            $ref: '#/definitions/dto.Response'
        "403":
          description: 认证失败
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/dto.Response'
      summary: 修改用户头像
      tags:
      - profile-update
  /api/profile/update/password:
    put:
